name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit to publish (defaults to release tag, then current branch)'
        required: false

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG_VERSION="v$(node -p "require('./packages/agentfw/package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Release tag $TAG does not match package version $PKG_VERSION"
            exit 1
          fi
          echo "Tag $TAG matches package version $PKG_VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check if version already on npm
        id: check
        working-directory: packages/agentfw
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@openguardrails/agentfw@$VERSION" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already on npm — skipping publish step"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not yet published"
          fi

      - name: Publish to npm with provenance
        if: steps.check.outputs.already_published == 'false'
        working-directory: packages/agentfw
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
